name: Bug 报告
description: 报告官网模板中的页面、构建、表单或 SEO 问题
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 访问哪个页面
        2. 执行什么操作
        3. 出现什么问题
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      placeholder: |
        OS:
        Node:
        npm:
        浏览器:
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 截图或补充信息

